name: 'SSH Port Forward'
description: 'Forward ports through SSH tunnels with support for jump hosts'

branding:
  icon: 'link'
  color: 'blue'

inputs:
  host:
    description: 'Target SSH host'
    required: true
  port:
    description: 'SSH port (default: 22)'
    required: false
    default: ''
  username:
    description: 'SSH username (optional - will use current user or SSH config if not specified)'
    required: false
  private-key-path:
    description: 'Path to SSH private key file'
    required: false
  password:
    description: 'SSH password (not recommended, use private key instead)'
    required: false
  known-hosts:
    description: 'SSH known_hosts content'
    required: false
  local-forwards:
    description: 'Local port forwards (-L). Format: "local_port:remote_host:remote_port" or "local_host:local_port:remote_host:remote_port". Multiple forwards separated by comma'
    required: false
  remote-forwards:
    description: 'Remote port forwards (-R). Format: "remote_port:local_host:local_port" or "remote_host:remote_port:local_host:local_port". Multiple forwards separated by comma'
    required: false
  jump-hosts:
    description: 'Comma-separated list of jump hosts (format: user@host:port)'
    required: false
  extra-flags:
    description: 'Additional SSH flags'
    required: false
    default: ''
  command:
    description: 'Command to execute on the remote SSH host (alternative to port forwarding)'
    required: false
    default: ''
  post-command:
    description: 'Command to execute on the remote host after the workflow completes'
    required: false
    default: ''
  timeout:
    description: 'Connection timeout in seconds (default: 30)'
    required: false
    default: '30'
  keep-alive:
    description: 'Send keep-alive packets every N seconds (default: 60)'
    required: false
    default: '60'

outputs:
  pid:
    description: 'Process ID of the background SSH tunnel'
    value: ${{ steps.ssh.outputs.pid }}

runs:
  using: 'composite'
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        # Check if we have either port forwarding configuration OR command (but not both)
        if [[ -n "${{ inputs.command }}" ]]; then
          if [[ -n "${{ inputs.local-forwards }}" || -n "${{ inputs.remote-forwards }}" ]]; then
            echo "Error: Cannot specify both 'command' and port forwarding options (local-forwards/remote-forwards)"
            echo "Use either:"
            echo "  - 'command' for executing a command on the remote host"
            echo "  - 'local-forwards' and/or 'remote-forwards' for port forwarding"
            exit 1
          fi
          echo "Command mode: will execute '${{ inputs.command }}' on remote host"
          exit 0
        fi
        
        # Port forwarding mode - require at least one forwarding option
        if [[ -z "${{ inputs.local-forwards }}" && -z "${{ inputs.remote-forwards }}" ]]; then
          echo "Error: Must specify either local-forwards or remote-forwards (or both) when not using command mode"
          exit 1
        fi
        
        # Validate local-forwards format
        if [[ -n "${{ inputs.local-forwards }}" ]]; then
          IFS=',' read -ra FORWARDS <<< "${{ inputs.local-forwards }}"
          for forward in "${FORWARDS[@]}"; do
            forward=$(echo "$forward" | xargs) # trim whitespace
            if [[ ! "$forward" =~ ^([^:]+:)?[0-9]+:[^:]+:[0-9]+$ ]]; then
              echo "Error: Invalid local-forwards format: '$forward'"
              echo "Expected format: '[local_host:]local_port:remote_host:remote_port'"
              exit 1
            fi
          done
        fi
        
        # Validate remote-forwards format
        if [[ -n "${{ inputs.remote-forwards }}" ]]; then
          IFS=',' read -ra FORWARDS <<< "${{ inputs.remote-forwards }}"
          for forward in "${FORWARDS[@]}"; do
            forward=$(echo "$forward" | xargs) # trim whitespace
            if [[ ! "$forward" =~ ^([^:]+:)?[0-9]+:[^:]+:[0-9]+$ ]]; then
              echo "Error: Invalid remote-forwards format: '$forward'"
              echo "Expected format: '[remote_host:]remote_port:local_host:local_port'"
              exit 1
            fi
          done
        fi

    - name: Setup SSH directory
      shell: bash
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh

    - name: Setup known hosts
      if: inputs.known-hosts != ''
      shell: bash
      id: known-hosts
      run: |
        KNOWN_HOSTS_FILE="$HOME/.ssh/known_hosts2"
        
        echo "${{ inputs.known-hosts }}" >> $KNOWN_HOSTS_FILE
        chmod 600 $KNOWN_HOSTS_FILE

        echo "file=$KNOWN_HOSTS_FILE" >> $GITHUB_OUTPUT

    - name: Install sshpass (for password auth)
      if: inputs.password != '' && runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y sshpass

    - name: Install sshpass (macOS)
      if: inputs.password != '' && runner.os == 'macOS'
      shell: bash
      run: |
        brew install sshpass

    - name: Prepare SSH command
      id: cmd
      shell: bash
      env:
        COMMAND_INPUT: ${{ inputs.command }}
      run: |
        # Build SSH command
        SSH_CMD="ssh"
        if [[ -n "${{ steps.known-hosts.outputs.file }}" ]]; then
          SSH_CMD="$SSH_CMD -o UserKnownHostsFile='${{ steps.known-hosts.outputs.file }}'"
        fi
        
        # Add timeout and keep-alive options
        SSH_CMD="$SSH_CMD -o ConnectTimeout=${{ inputs.timeout }}"
        SSH_CMD="$SSH_CMD -o ServerAliveInterval=${{ inputs.keep-alive }}"
        SSH_CMD="$SSH_CMD -o ServerAliveCountMax=3"
        SSH_CMD="$SSH_CMD -T"
        
        # Add custom SSH flags
        if [[ -n "${{ inputs.extra-flags }}" ]]; then
          SSH_CMD="$SSH_CMD ${{ inputs.extra-flags }}"
        fi
        
        # Add authentication
        if [[ -n "${{ inputs.password }}" ]]; then
          SSH_CMD="sshpass -p '${{ inputs.password }}' $SSH_CMD"
        elif [[ -n "${{ inputs.private-key-path }}" ]]; then
          SSH_CMD="$SSH_CMD -i '${{ inputs.private-key-path }}'"
        fi
        
        # Add jump hosts if specified
        if [[ -n "${{ inputs.jump-hosts }}" ]]; then
          JUMP_HOSTS=$(echo "${{ inputs.jump-hosts }}" | tr ',' ' ')
          for jump_host in $JUMP_HOSTS; do
            SSH_CMD="$SSH_CMD -J $jump_host"
          done
        fi
        
        # Process port forwarding options
        LOCAL_FORWARDS=""
        REMOTE_FORWARDS=""
        
        # Handle local-forwards format
        if [[ -n "${{ inputs.local-forwards }}" ]]; then
          IFS=',' read -ra FORWARDS <<< "${{ inputs.local-forwards }}"
          for forward in "${FORWARDS[@]}"; do
            forward=$(echo "$forward" | xargs) # trim whitespace
            SSH_CMD="$SSH_CMD -L $forward"
            LOCAL_FORWARDS="$LOCAL_FORWARDS$forward,"
          done
          LOCAL_FORWARDS="${LOCAL_FORWARDS%,}" # remove trailing comma
        fi
        
        # Handle remote-forwards format
        if [[ -n "${{ inputs.remote-forwards }}" ]]; then
          IFS=',' read -ra FORWARDS <<< "${{ inputs.remote-forwards }}"
          for forward in "${FORWARDS[@]}"; do
            forward=$(echo "$forward" | xargs) # trim whitespace
            SSH_CMD="$SSH_CMD -R $forward"
            REMOTE_FORWARDS="$REMOTE_FORWARDS$forward,"
          done
          REMOTE_FORWARDS="${REMOTE_FORWARDS%,}" # remove trailing comma
        fi
        
        # Set a different port if requested
        if [[ -n "${{ inputs.port }}" ]]; then
          SSH_CMD="$SSH_CMD -p ${{ inputs.port }}"
        fi
        
        # Build the SSH target (host with optional username)
        SSH_TARGET="${{ inputs.host }}"
        if [[ -n "${{ inputs.username }}" ]]; then
          SSH_TARGET="${{ inputs.username }}@$SSH_TARGET"
        fi
        
        # Add connection details
        SSH_CMD="$SSH_CMD $SSH_TARGET"
        echo 'base=$SSH_CMD' >> $GITHUB_OUTPUT

        if [[ -n "$COMMAND_INPUT" ]]; then
          # Execute command using environment variable
          SSH_CMD="$SSH_CMD $(printf '%q' "$COMMAND_INPUT")"
        else
          # Add options to run in background and not execute commands
          SSH_CMD="$SSH_CMD -N -f"
        fi

        # Output variable
        echo 'ssh<<EOF' >> $GITHUB_OUTPUT
        echo "$SSH_CMD" >> $GITHUB_OUTPUT
        echo 'EOF' >> $GITHUB_OUTPUT
        echo "$SSH_CMD"

    - name: Run SSH command
      id: ssh
      shell: bash
      env:
        COMMAND_INPUT: ${{ inputs.command }}
      run: |
        set -e
        
        SSH_CMD="${{ steps.cmd.outputs.ssh }}"
        
        # Execute SSH command
        echo "Executing SSH command:"
        eval "$SSH_CMD"

        if [[ -n "$COMMAND_INPUT" ]]; then
          echo "Successfully executed command"
          exit 0
        fi
        
        # Find the SSH process PID
        sleep 2
        if [[ "$RUNNER_OS" == "Windows" ]]; then
          echo "Getting ssh tunnel process id on Windows"
          PID=$(pwsh -Command "
            Get-WmiObject Win32_Process |
              Where-Object { \$_.Name -eq 'ssh.exe' -and \$_.CommandLine -like '*$SSH_TARGET*' } |
              Select-Object -First 1 -ExpandProperty ProcessId
          " || true)
        else
          echo "Getting ssh tunnel process id on unix"
          PID=$(ps aux | grep "ssh.*$SSH_TARGET" | grep -v grep | awk '{print $2}' | head -1 || true)
        fi

        if [[ -z "$PID" ]]; then
          echo "Error: Could not find SSH tunnel process"
          exit 1
        fi
        
        echo "SSH tunnel established with PID: $PID"
        echo "Local forwards: $LOCAL_FORWARDS"
        echo "Remote forwards: $REMOTE_FORWARDS"
        
        echo "pid=$PID" >> $GITHUB_OUTPUT

    - name: Post SSH connection cleanup
      uses: gacts/run-and-post-run@v1
      env:
        SSH_CMD: ${{ steps.cmd.outputs.base }}
        POST_CMD: ${{ inputs.post-command }}
        KNOWN_HOSTS_FILE: ${{ steps.known-hosts.outputs.file }}
        SSH_TUNNEL_PID: ${{ steps.ssh.outputs.pid }}
      with:
        post: |
          if [[ -n "$POST_CMD" ]]; then
            echo "Executing SSH post command:"
            eval "$SSH_CMD" "$POST_CMD"
          fi

          # Clean temporary known_hosts file. 
          if [[ -n "$KNOWN_HOSTS_FILE" ]]; then
            rm "$KNOWN_HOSTS_FILE" || true
          fi

          # Close background tunnel.
          if [[ -n "$SSH_TUNNEL_PID" ]]; then
            echo "Cleaning up SSH tunnel (PID: $SSH_TUNNEL_PID)..."
            if [[ "$RUNNER_OS" == "Windows" ]]; then
              taskkill /PID $SSH_TUNNEL_PID /F 2>/dev/null || true
            else
              kill $SSH_TUNNEL_PID 2>/dev/null || (sleep 2 && kill -9 $SSH_TUNNEL_PID 2>/dev/null) || true
            fi
            echo "SSH tunnel cleanup completed"
          fi
